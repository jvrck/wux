# hono HTTP-surface advisories. hono is a transitive dependency of
# @modelcontextprotocol/sdk's HTTP/SSE transport. wux is a CLI that uses the
# stdio MCP transport only — no HTTP server, no listening port, no CORS
# middleware, no AWS Lambda / Lambda@Edge adapter, and no static-file serving.
# Every affected surface below is therefore never imported or executed, and is
# tree-shaken out of the `bun build --compile` binary. Unreachable in wux.
