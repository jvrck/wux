name: Release

on:
  push:
    tags:
      - '20[0-9][0-9].*'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset: wux-linux-x64
          - target: bun-linux-arm64
            asset: wux-linux-arm64
          - target: bun-darwin-arm64
            asset: wux-darwin-arm64
          - target: bun-linux-x64-musl
            asset: wux-linux-x64-musl
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'
      - run: bun install --frozen-lockfile
      - name: Build stamped binary
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          if ! [[ "$VERSION" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?$ ]]; then
            echo "::error::release tag must be CalVer YYYY.MM.DD or YYYY.MM.DD.N: $TAG"
            exit 1
          fi
          mkdir -p dist
          bun build src/index.ts --compile --target=${{ matrix.target }} --define "process.env.WUX_VERSION=\"$VERSION\"" --outfile dist/${{ matrix.asset }}
          chmod +x dist/${{ matrix.asset }}
          if [ "${{ matrix.target }}" = "bun-linux-x64" ]; then
            test "$(./dist/${{ matrix.asset }} --version)" = "$VERSION"
          fi
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error
          # Intermediate matrix build artifacts: the release job downloads these
          # within the same run, after which the published GitHub Release assets are
          # the durable record. Keep a short window so they do not accumulate (#148);
          # 3 days (not 1) leaves a release anomaly recoverable.
          retention-days: 3

  validate-native:
    name: Validate ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: wux-linux-x64
            os: ubuntu-latest
            setup: apt
          - asset: wux-linux-arm64
            os: ubuntu-24.04-arm
            setup: apt
          - asset: wux-darwin-arm64
            os: macos-15
            setup: brew
    env:
      TAG: ${{ github.ref_name }}
      ASSET: ${{ matrix.asset }}
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Validate tag
        shell: bash
        run: |
          set -euo pipefail
          if ! [[ "$TAG" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?$ ]]; then
            echo "::error::release tag must be CalVer YYYY.MM.DD or YYYY.MM.DD.N: $TAG"
            exit 1
          fi

      - name: Install tmux
        shell: bash
        run: |
          set -euo pipefail
          if command -v tmux >/dev/null 2>&1; then
            tmux -V
            exit 0
          fi

          case "${{ matrix.setup }}" in
            apt)
              sudo apt-get update
              sudo apt-get install -y tmux
              ;;
            brew)
              brew install tmux
              ;;
            *)
              echo "::error::unknown setup mode: ${{ matrix.setup }}"
              exit 1
              ;;
          esac
          tmux -V

      - uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ matrix.asset }}
          path: ${{ runner.temp }}/release-assets/${{ matrix.asset }}

      - name: Verify build artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          asset_dir="$RUNNER_TEMP/release-assets/$ASSET"
          asset_path="$asset_dir/$ASSET"
          version="${TAG#v}"

          test -s "$asset_path"
          chmod 0755 "$asset_path"
          test "$("$asset_path" --version)" = "$version"
          "$asset_path" --help >/dev/null

          printf 'asset_dir=%s\n' "$asset_dir" >> "$GITHUB_OUTPUT"

      - name: Start a tmux server for the lifecycle smoke
        shell: bash
        # The smoke runs the binary's `wux run`, whose createSession elevates the
        # global tmux history-limit before new-session and so needs a server
        # already running. A clean runner has none; start a keepalive. CI setup
        # only — no change to the released binary.
        run: tmux new-session -d -s wux-ci-keepalive
      - name: Run lifecycle smoke
        shell: bash
        run: |
          set -euo pipefail
          WUX_BIN="${{ steps.artifact.outputs.asset_dir }}/$ASSET" \
            EXPECTED_VERSION="$TAG" \
            WUX_SMOKE_ROOT="$RUNNER_TEMP/smoke/$ASSET" \
            WUX_SMOKE_DIAG_DIR="$RUNNER_TEMP/diagnostics/$ASSET" \
            scripts/smoke-release-asset.sh

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-smoke-${{ matrix.asset }}-${{ matrix.os }}-diagnostics
          path: |
            ${{ runner.temp }}/diagnostics/${{ matrix.asset }}
            ${{ runner.temp }}/smoke/${{ matrix.asset }}/state/wux/runs
          if-no-files-found: ignore
          retention-days: 14

  validate-linux-musl:
    name: Validate ${{ matrix.asset }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: wux-linux-x64-musl
            image: alpine:3.20
    env:
      TAG: ${{ github.ref_name }}
      ASSET: ${{ matrix.asset }}
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Validate tag
        shell: bash
        run: |
          set -euo pipefail
          if ! [[ "$TAG" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?$ ]]; then
            echo "::error::release tag must be CalVer YYYY.MM.DD or YYYY.MM.DD.N: $TAG"
            exit 1
          fi

      - uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ matrix.asset }}
          path: ${{ runner.temp }}/release-assets/${{ matrix.asset }}

      - name: Run Alpine lifecycle smoke
        shell: bash
        run: |
          set -euo pipefail
          asset_dir="$RUNNER_TEMP/release-assets/$ASSET"
          test -s "$asset_dir/$ASSET"
          mkdir -p "$RUNNER_TEMP/diagnostics/$ASSET"

          docker run --rm \
            -e RELEASE_ASSET="/release/$ASSET" \
            -e EXPECTED_VERSION="$TAG" \
            -e WUX_SMOKE_ROOT="/tmp/wux-smoke/$ASSET" \
            -e WUX_SMOKE_DIAG_DIR="/diagnostics" \
            -v "$asset_dir:/release:ro" \
            -v "$PWD/scripts:/scripts:ro" \
            -v "$RUNNER_TEMP/diagnostics/$ASSET:/diagnostics" \
            ${{ matrix.image }} \
            sh -euxc '
              apk add --no-cache bash coreutils libstdc++ tmux
              # createSession needs a running tmux server for its history-limit
              # elevation; a fresh container has none. Start a keepalive.
              tmux new-session -d -s wux-ci-keepalive
              test -s "$RELEASE_ASSET"
              cp "$RELEASE_ASSET" /tmp/wux
              chmod 0755 /tmp/wux
              test "$(/tmp/wux --version)" = "${EXPECTED_VERSION#v}"
              /tmp/wux --help >/dev/null
              WUX_BIN=/tmp/wux /scripts/smoke-release-asset.sh
            '

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-smoke-wux-linux-x64-musl-alpine-diagnostics
          path: |
            ${{ runner.temp }}/diagnostics/wux-linux-x64-musl
          if-no-files-found: ignore
          retention-days: 14

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-native, validate-linux-musl]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Install security scanners
        run: scripts/install-security-tools.sh
      - name: Generate and scan release SBOM
        run: |
          set -euo pipefail
          trivy fs --format cyclonedx --include-dev-deps --output sbom.cdx.json .
          trivy sbom sbom.cdx.json --ignorefile .trivyignore.yaml --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1
      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Stage release SBOM
        run: |
          set -euo pipefail
          mv sbom.cdx.json dist/sbom.cdx.json
      - name: Create SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          sha256sum wux-* sbom.cdx.json > SHA256SUMS
      - name: Extract release notes from changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          scripts/extract-changelog-section.sh "$TAG" CHANGELOG.md > "$RUNNER_TEMP/release-notes.md"
      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd dist
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file "$RUNNER_TEMP/release-notes.md" wux-* sbom.cdx.json SHA256SUMS
