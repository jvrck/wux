name: Validate Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to validate, for example 2026.06.12 or 2026.06.12.2
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate-native:
    name: Validate ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: wux-linux-x64
            os: ubuntu-latest
            setup: apt
          - asset: wux-linux-arm64
            os: ubuntu-24.04-arm
            setup: apt
          - asset: wux-darwin-arm64
            os: macos-15
            setup: brew
    env:
      TAG: ${{ inputs.tag }}
      ASSET: ${{ matrix.asset }}
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Validate tag
        shell: bash
        run: |
          set -euo pipefail
          if ! [[ "$TAG" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?$ ]]; then
            echo "::error::release tag must be CalVer YYYY.MM.DD or YYYY.MM.DD.N: $TAG"
            exit 1
          fi

      - name: Install tmux
        shell: bash
        run: |
          set -euo pipefail
          if command -v tmux >/dev/null 2>&1; then
            tmux -V
            exit 0
          fi

          case "${{ matrix.setup }}" in
            apt)
              sudo apt-get update
              sudo apt-get install -y tmux
              ;;
            brew)
              brew install tmux
              ;;
            *)
              echo "::error::unknown setup mode: ${{ matrix.setup }}"
              exit 1
              ;;
          esac
          tmux -V

      - name: Download and verify asset
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset_dir="$RUNNER_TEMP/release-assets/$ASSET"
          mkdir -p "$asset_dir"

          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$ASSET" \
            --pattern SHA256SUMS \
            --dir "$asset_dir" \
            --clobber

          test -s "$asset_dir/$ASSET"
          test -s "$asset_dir/SHA256SUMS"
          (
            cd "$asset_dir"
            grep -E "[[:space:]]\*?$ASSET$" SHA256SUMS > SHA256SUMS.one
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum -c SHA256SUMS.one
            else
              shasum -a 256 -c SHA256SUMS.one
            fi
            chmod 0755 "$ASSET"
          )

          printf 'asset_dir=%s\n' "$asset_dir" >> "$GITHUB_OUTPUT"

      - name: Run lifecycle smoke
        shell: bash
        run: |
          set -euo pipefail
          WUX_BIN="${{ steps.release.outputs.asset_dir }}/$ASSET" \
            EXPECTED_VERSION="$TAG" \
            WUX_SMOKE_ROOT="$RUNNER_TEMP/smoke/$ASSET" \
            WUX_SMOKE_DIAG_DIR="$RUNNER_TEMP/diagnostics/$ASSET" \
            scripts/smoke-release-asset.sh

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-smoke-${{ matrix.asset }}-${{ matrix.os }}-diagnostics
          path: |
            ${{ runner.temp }}/diagnostics/${{ matrix.asset }}
            ${{ runner.temp }}/smoke/${{ matrix.asset }}/state/wux/runs
          if-no-files-found: ignore
          retention-days: 14

  validate-linux-musl:
    name: Validate ${{ matrix.asset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: wux-linux-x64-musl
            image: alpine:3.20
    env:
      TAG: ${{ inputs.tag }}
      ASSET: ${{ matrix.asset }}
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Validate tag
        shell: bash
        run: |
          set -euo pipefail
          if ! [[ "$TAG" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?$ ]]; then
            echo "::error::release tag must be CalVer YYYY.MM.DD or YYYY.MM.DD.N: $TAG"
            exit 1
          fi

      - name: Download and verify asset
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset_dir="$RUNNER_TEMP/release-assets/$ASSET"
          mkdir -p "$asset_dir"

          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$ASSET" \
            --pattern SHA256SUMS \
            --dir "$asset_dir" \
            --clobber

          test -s "$asset_dir/$ASSET"
          test -s "$asset_dir/SHA256SUMS"
          (
            cd "$asset_dir"
            grep -E "[[:space:]]\*?$ASSET$" SHA256SUMS > SHA256SUMS.one
            sha256sum -c SHA256SUMS.one
            chmod 0755 "$ASSET"
          )

          printf 'asset_dir=%s\n' "$asset_dir" >> "$GITHUB_OUTPUT"

      - name: Run Alpine lifecycle smoke
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/diagnostics/$ASSET"

          docker run --rm \
            -e RELEASE_ASSET="/release/$ASSET" \
            -e EXPECTED_VERSION="$TAG" \
            -e WUX_SMOKE_ROOT="/tmp/wux-smoke/$ASSET" \
            -e WUX_SMOKE_DIAG_DIR="/diagnostics" \
            -v "${{ steps.release.outputs.asset_dir }}:/release:ro" \
            -v "$PWD/scripts:/scripts:ro" \
            -v "$RUNNER_TEMP/diagnostics/$ASSET:/diagnostics" \
            ${{ matrix.image }} \
            sh -euxc '
              apk add --no-cache bash coreutils libstdc++ tmux
              cp "$RELEASE_ASSET" /tmp/wux
              chmod 0755 /tmp/wux
              WUX_BIN=/tmp/wux /scripts/smoke-release-asset.sh
            '

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-smoke-wux-linux-x64-musl-alpine-diagnostics
          path: |
            ${{ runner.temp }}/diagnostics/wux-linux-x64-musl
          if-no-files-found: ignore
          retention-days: 14
