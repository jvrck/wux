name: CI
on:
  push:
    branches: [main, "epic/**"]
  pull_request:
    branches: [main, "epic/**"]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'
      - run: sudo apt-get update && sudo apt-get install -y tmux
      # The `(integration, real tmux)` suite drives a real tmux server. wux's
      # createSession elevates the global history-limit (`set-option -g`) before
      # `new-session`, which needs a server already running; a clean runner has
      # none until the first `new-session`. Start a keepalive server so the test
      # precondition mirrors an operator host. CI setup only — no tool change.
      - name: Start a tmux server for integration tests
        run: tmux new-session -d -s wux-ci-keepalive
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
