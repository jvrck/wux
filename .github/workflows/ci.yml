name: CI
on:
  push:
    branches: [main, "epic/**"]
  pull_request:
    branches: [main, "epic/**"]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'
      - run: sudo apt-get update && sudo apt-get install -y tmux
      # The `(integration, real tmux)` suite drives a real tmux server, but we do
      # NOT pre-start one: a clean runner has no tmux server, which is exactly the
      # first-run precondition an operator hits. createSession tolerates the
      # pre-server history-limit elevation failing and lets `new-session -f <conf>`
      # start the server (the 2026.06.21.1 fix), so the suite's first `wux run`
      # exercises the serverless first-run path. Pre-starting a keepalive here
      # would mask that path — removing it makes this real regression coverage.
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
