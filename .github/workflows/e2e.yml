name: E2E

on:
  pull_request:
    branches: [main, "epic/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  binary-smoke:
    name: Binary lifecycle smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'
      - run: sudo apt-get update && sudo apt-get install -y tmux
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Run lifecycle smoke
        env:
          WUX_BIN: ${{ github.workspace }}/dist/wux
          EXPECTED_VERSION: 0.0.0-dev
          WUX_SMOKE_ROOT: ${{ runner.temp }}/wux-local-smoke
          WUX_SMOKE_DIAG_DIR: ${{ runner.temp }}/diagnostics/local
        run: scripts/smoke-release-asset.sh
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: e2e-local-binary-diagnostics
          path: |
            ${{ runner.temp }}/diagnostics/local
            ${{ runner.temp }}/wux-local-smoke/state/wux/runs
          if-no-files-found: ignore
          retention-days: 14

  remote-ssh-smoke:
    name: Remote SSH smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: docker compose version
      - name: Run remote --host smoke
        env:
          WUX_BIN: ${{ github.workspace }}/dist/wux
          WUX_REMOTE_SMOKE_ROOT: ${{ runner.temp }}/wux-remote-smoke
          WUX_REMOTE_DIAG_DIR: ${{ runner.temp }}/diagnostics/remote
        run: scripts/smoke-remote-ssh.sh
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: e2e-remote-ssh-diagnostics
          path: |
            ${{ runner.temp }}/diagnostics/remote
            ${{ runner.temp }}/wux-remote-smoke/state/wux/runs
          if-no-files-found: ignore
          retention-days: 14
